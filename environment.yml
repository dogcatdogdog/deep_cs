name: cs_env
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pytorch=2.5.1
  - torchvision
  - torchaudio
  - pytorch-cuda=12.1
  - numpy=1.24.3
  - scipy=1.10.1
  - networkx
  - pandas
  - matplotlib
  - tqdm
  - pyyaml
  - pip
  - pip:
      - torch-geometric==2.7.0
      - wandb==0.24.0
      - ipykernel
      - jupyterlab
      - requests
      - aiohttp